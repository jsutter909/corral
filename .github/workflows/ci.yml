name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and zsh
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh

      - name: Lint
        run: make lint

      - name: Generated artifacts are fresh
        run: make check-generated

      - name: Tests
        run: make test
